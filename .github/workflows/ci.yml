name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.actor }}
  cancel-in-progress: true

env:
  PIXI_VERSION: v0.48.1

jobs:
  lint:
    if: github.actor != 'ecoscope-elebot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Lint
        run: |
          pre-commit install
          pre-commit run --all-files

  mypy:
    if: github.actor != 'ecoscope-elebot'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['310', '311', '312']
    steps:
      - uses: actions/checkout@v4
      - name: Install pixi
        run: curl -fsSL https://pixi.sh/install.sh | bash && echo "$HOME/.pixi/bin" >> $GITHUB_PATH
      - name: Mypy
        run: pixi run -e test-${{ matrix.python-version }} mypy-${{ matrix.python-version }}

  test-pip:
    if: github.actor != 'ecoscope-elebot'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5 
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pytest
      - name: Test
        # Note dataframe.py doctests are ignored because this
        # module is not intended for pip-installed contexts
        run: |
          python -m pytest src tests --doctest-modules -vv \
          --ignore src/ecoscope_earthranger_io_core/dataframe.py

  test-pixi:
    if: github.actor != 'ecoscope-elebot'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['310', '311', '312']
    steps:
      - uses: actions/checkout@v4
      - name: Install pixi
        run: curl -fsSL https://pixi.sh/install.sh | bash && echo "$HOME/.pixi/bin" >> $GITHUB_PATH
      - name: Test
        run: pixi run -e test-${{ matrix.python-version }} test-${{ matrix.python-version }}
